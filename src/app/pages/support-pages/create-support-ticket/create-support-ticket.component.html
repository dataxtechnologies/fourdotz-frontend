<section class="cst-section">
    <div>
        <button class="gobackbtn" (click)="goback()">Go Back</button>
    </div>
    <div class="cst-card">

        <!-- ── Card Header ─────────────────────────────────────── -->
        <div class="cst-header">
            <div class="cst-header__icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 5v2M15 11v2M15 17v2
                   M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3
                   a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3
                   a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z" />
                </svg>
            </div>
            <div class="cst-header__text">
                <h2 class="cst-header__title medium-font">Create Support Ticket</h2>
                <p class="cst-header__sub regular-font">
                    Raise a new request — our support team will respond shortly.
                </p>
            </div>
        </div>

        <!-- ── Form Body ───────────────────────────────────────── -->
        <div class="cst-body">

            <!-- Row: Property No. + Module Name (side by side on ≥768 px) -->
            <div class="cst-row">

                <!-- Property No. -->
                <div class="cst-field" [class.cst-field--error]="propertyError" *ngIf="userType !== 'association'">
                    <label class="cst-label medium-font" for="propSearch">
                        Property No. <span class="cst-required">*</span>
                    </label>

                    <div class="cst-search" [class.cst-search--open]="showPropertyDropdown">

                        <div class="cst-search__input-wrap">
                            <svg class="cst-search__icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.35-4.35" />
                            </svg>

                            <input id="propSearch" type="text" class="cst-search__input regular-font"
                                placeholder="Search property number or name…" autocomplete="off"
                                [(ngModel)]="propertySearch" (input)="onPropertyInput()" (focus)="openDropdown()"  (click)="$event.stopPropagation()"/>

                            <span class="cst-search__badge" *ngIf="selectedProperty">
                               {{ selectedProperty.property_no }}
                                <button class="cst-search__clear" type="button" (click)="clearProperty($event)"
                                    title="Clear">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="3" stroke-linecap="round">
                                        <path d="M18 6 6 18M6 6l12 12" />
                                    </svg>
                                </button>
                            </span>
                        </div>

                        <ul class="cst-search__list" *ngIf="showPropertyDropdown"  (click)="$event.stopPropagation()">

                            <li class="cst-search__item" *ngFor="let prop of filteredProperties"
                                (mousedown)="selectProperty(prop)">
                                <span class="cst-search__item-id">{{ prop.property_no }}</span>
                                <span class="cst-search__item-name">{{ prop.property_name }}</span>
                            </li>

                            <li class="cst-search__empty" *ngIf="filteredProperties.length === 0">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <path d="m21 21-4.35-4.35" />
                                </svg>
                                No matching properties
                            </li>

                        </ul>
                    </div>

                    <span class="cst-error-msg" *ngIf="propertyError">
                        Please select a property.
                    </span>
                </div>

                <!-- Module Name -->
                <div class="cst-field" [class.cst-field--error]="moduleError">
                    <label class="cst-label medium-font" for="moduleName">
                        Module Name <span class="cst-required">*</span>
                    </label>

                    <div class="cst-select-wrap">
                        <select id="moduleName" class="cst-select" [(ngModel)]="selectedModule">
                            <option value="" disabled>Select a module</option>
                            <option *ngFor="let mod of modules" [value]="mod">{{ mod }}</option>
                        </select>
                        <svg class="cst-select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>

                    <span class="cst-error-msg" *ngIf="moduleError">
                        Please select a module.
                    </span>
                </div>

            </div><!-- /cst-row -->

            <!-- Description -->
            <div class="cst-field" [class.cst-field--error]="descriptionError">
                <label class="cst-label medium-font" for="description">
                    Description <span class="cst-required">*</span>
                </label>
                <textarea id="description" class="cst-textarea" rows="5" 
                    placeholder="Describe your issue in detail — steps to reproduce, expected outcome, error messages…"
                    [(ngModel)]="description">
        </textarea>
                <div class="cst-textarea-footer">
                    <span class="cst-error-msg" *ngIf="descriptionError">
                        Description is required.
                    </span>
                    <!-- <span class="cst-char-count" [class.cst-char-count--warn]="description.length > 900">
                        {{ description.length }} / 1000
                    </span> -->
                </div>
            </div>

        </div><!-- /cst-body -->

        <!-- ── Footer Actions ──────────────────────────────────── -->
        <div class="cst-footer">
            <button class="cst-btn cst-btn--ghost" type="button" (click)="onCancel()">
                Cancel
            </button>
            <button class="cst-btn cst-btn--primary" type="button" (click)="onSubmit()" *ngIf="!btnstatusloading">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z" />
                </svg>
                Submit Ticket
            </button>
            <button class="cst-btn cst-btn--primary" type="button" *ngIf="btnstatusloading">
                <i class="fa-solid fa-spinner fa-spin"></i>
               Processing...
            </button>
        </div>

    </div>
</section>
