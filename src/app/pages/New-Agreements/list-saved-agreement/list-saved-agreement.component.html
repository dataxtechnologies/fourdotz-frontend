<section>
    <div>

        <!-- HEADER -->
        <div class="container header-cont">
            <div class="head-cont">
                <h2>List Agreements</h2>
            </div>
            <div>
                <button class="btn-add" (click)="openSelectAgreementModal()">
                    + Create Agreement
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="container">
            <div class="item">

                <div class="new-table-wrapper">

                    <!-- SCROLL -->
                    <div class="table-scroll-wrapper">
                        <div class="table-scroll">

                            <table class="new-table">

                                <!-- HEADER -->
                                <thead>
                                    <tr class="medium-font">
                                        <th class="sticky-col lead-col">Agreement Name</th>
                                        <th>Created At</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>

                                <!-- BODY -->
                                <tbody *ngIf="!tableLoading; else tableSkeleton" class="regular-font">

                                    <!-- DATA -->
                                    <tr *ngFor="let item of spotVisitorlist1.paginatedData">

                                        <!-- STICKY COLUMN -->
                                        <td class="sticky-col lead-col">
                                            {{ item.template_name }}
                                        </td>

                                        <td>
                                            {{ item.created_time.$date | date:'dd-MMM-yyyy' }}
                                        </td>

                                        <td>
                                            <span class="table-btn" (click)="openagreement(item._id)">
                                                View
                                            </span>
                                        </td>

                                    </tr>

                                    <!-- NO DATA -->
                                    <tr *ngIf="spotVisitorlist1.paginatedData.length === 0">
                                        <td colspan="3" style="text-align:center; color:gray; font-weight:600;">
                                            No Data Found
                                        </td>
                                    </tr>

                                </tbody>
                            </table>

                            <!-- SKELETON -->
                            <ng-template #tableSkeleton>
                                <tr *ngFor="let i of [1,2,3,4,5]" style="height:50px">
                                    <td class="sticky-col lead-col">
                                        <span class="placeholder col-8"></span>
                                    </td>
                                    <td><span class="placeholder col-6"></span></td>
                                    <td><span class="placeholder col-4"></span></td>
                                </tr>
                            </ng-template>

                        </div>
                    </div>

                    <!-- PAGINATION -->
                    <div class="crm-pagination" *ngIf="spotVisitorlist1">
                        <div class="regular-font">
                            Showing
                            <span class="medium-font">{{ spotVisitorlist1.startIndex + 1 }}</span>
                            to
                            <span class="medium-font">{{ spotVisitorlist1.endIndex + 1 }}</span>
                            of
                            <span class="medium-font">{{ spotVisitorlist1.totalData }}</span>
                            entries
                        </div>

                        <div class="d-flex gap-3 regular-font">
                            <button class="nav-btn" (click)="spotVisitorlist1.prevPage()"
                                [disabled]="spotVisitorlist1.currentPage === 1">
                                ‹ Prev
                            </button>

                            <button class="page-btn active">
                                {{ spotVisitorlist1.currentPage }}
                            </button>

                            <button class="nav-btn" (click)="spotVisitorlist1.nextPage()"
                                [disabled]="spotVisitorlist1.currentPage === spotVisitorlist1.totalPages">
                                Next ›
                            </button>
                        </div>
                    </div>

                </div>

            </div>
        </div>

    </div>
</section>
