<section class="agreement-builder">

    <!-- ================= HEADER ================= -->
    <div class="builder-header">
        <div class="d-flex gap-3 align-items-center">
            <i class="fa-solid fa-arrow-left" style="cursor:pointer" (click)="goback()"></i>
            <h3>Create Template</h3>
        </div>

        <div class="header-actions">
            <button class="submit-btn" (click)="openTemplateNameModal()">Save Template</button>
        </div>
    </div>

    <!-- ================= BODY GRID ================= -->
    <div class="builder-body">

        <!-- ================= LEFT : VARIABLES PANEL ================= -->
        <div class="variable-panel">
            <h4>Variables</h4>

            <button class="submit-btn" (click)="addHeading()">Heading</button>
            <button class="submit-btn" (click)="addParagraph()">Paragraph</button>
            <button class="submit-btn" (click)="openSignatureModal()">Signature</button>
            <button class="submit-btn w-100 mb-2" (click)="openVariableModal()">+ Add Variable</button>

            <div class="var-list">
                <span 
  *ngFor="let v of extractVariablesFromBlocks()" 
  class="variable-pill"
>
  {{ v.label }}
  <i class="fa-solid fa-xmark remove-var"
     (click)="removeVariable(v.key)">
  </i>
</span>
            </div>
        </div>

        <!-- ================= RIGHT : EDITOR ================= -->
        <div class="builder-preview">
            <div class="page">

                <ng-container *ngFor="let block of blocks; trackBy: trackById">

                    <!-- BLOCK WRAPPER -->
                    <div class="block-wrapper">

                        <button class="delete-block" (click)="removeBlock(block)">
                            <i class="fa fa-trash"></i>
                        </button>

                        <!-- ========== HEADING ========== -->
                        <h1
  *ngIf="block.type === 'heading'"
  class="doc-heading editable"
  contenteditable="true"
  spellcheck="false"
  data-placeholder="Type agreement heading here"
  [attr.data-id]="block.id"
  (focus)="onEditableFocus($event)"
  (input)="updateBlockValue($event, block)"
  (keydown)="handleEditorKeydown($event, block)">
</h1>

                        <!-- ========== PARAGRAPH ========== -->
<p
  *ngIf="block.type === 'paragraph'"
  class="doc-para editable"
  contenteditable="true"
  spellcheck="false"
  data-placeholder="Type paragraph content here..."
  [attr.data-id]="block.id"
  (focus)="onEditableFocus($event)"
  (input)="updateBlockValue($event, block)"
  (keydown)="handleEditorKeydown($event, block)">
</p>

                        <div *ngIf="block.type === 'paragraph'" class="para-gap"></div>

                        <!-- ========== SIGNATURE ========== -->
                        <div *ngIf="block.type === 'signature'" class="signature-section">

                            <div class="sign-box" *ngFor="let signer of block.signers">
                                <p class="sign-name">{{ signer.name }}</p>

                                <div class="sign-placeholder">
                                    {{ signer.signed ? 'Signed' : 'Pending Signature' }}
                                </div>

                                <div *ngIf="block.includeDate" class="sign-date">
                                    Date: {{ signer.signed ? signer.signedAt : '{{sign_date}}' }}
                                </div>
                            </div>

                        </div>

                    </div>

                </ng-container>

            </div>
        </div>

    </div>


    <!-- ================= VARIABLE MODAL ================= -->
    <div class="modal-backdrop" *ngIf="showVariableModal">
        <div class="modal-card">
            <h4>Add Variable</h4>

            <input placeholder="Key (tenant_name)" [(ngModel)]="variableForm.key" />

            <div class="modal-actions">
                <button class="btn-add" (click)="addVariable()">Add</button>
                <button class="btn-cancel" (click)="closeVariableModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================= SIGNATURE MODAL ================= -->
    <div class="modal-backdrop" *ngIf="showSignModal">
        <div class="modal-card">
            <h4>Add Signature</h4>

            <label>Number of signers</label>
            <select [(ngModel)]="signerCount" (ngModelChange)="updateSignerInputs()">
                <option [value]="1">1</option>
                <option [value]="2">2</option>
            </select>

           <div *ngFor="let s of signerInputs; let i = index; trackBy: trackByIndex">
    <input
      placeholder="Signer name"
      [ngModel]="signerInputs[i]"
      (ngModelChange)="updateSignerName(i, $event)"
      (focus)="keepModalFocus($event)"
    />
</div>

            <label class="mt-2">
                <input type="checkbox" [(ngModel)]="includeDate" />
                Include Date
            </label>

            <div class="modal-actions">
                <button class="btn-add" (click)="confirmSignature()">Add</button>
                <button class="btn-cancel" (click)="showSignModal=false">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TEMPLATE NAME MODAL remains unchanged -->
<div class="modal-backdrop" *ngIf="showTemplateNameModal">
        <div class="modal-card">
            <h4>Add Template Name</h4>

            <input placeholder="Template Name" [(ngModel)]="templateName" />

            <div class="modal-actions">
                <button class="btn-add" *ngIf="submitbtn" (click)="confirmSaveTemplate()">
                    Save
                </button>

                <button class="btn-add mx-1" *ngIf="!submitbtn" disabled>
                    Saving...
                </button>

                <button class="btn-cancel" (click)="closeTemplateNameModal()">Cancel</button>
            </div>
        </div>
    </div>
</section>
