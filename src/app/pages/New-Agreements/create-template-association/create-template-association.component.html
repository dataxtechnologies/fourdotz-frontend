<section class="agreement-builder">

    <!-- ================= HEADER ================= -->
    <div class="builder-header">
        <div class="d-flex gap-3 align-items-center">
            <i class="fa-solid fa-arrow-left" style="cursor:pointer" (click)="goback()"></i>
            <h3>Create Template</h3>
        </div>

        <div class="header-actions">
            <button class="btn-add mx-1" (click)="openVariableModal()">＋ Variable</button>
            <button class="btn-add mx-1" (click)="openTemplateNameModal()">Save Template</button>
        </div>
    </div>

    <!-- ================= BODY ================= -->
    <div class="builder-body">

        <!-- LEFT : CONTROLS -->
        <div class="builder-controls">
            <h4>Add Content</h4>

            <button class="btn" (click)="addHeading()" [disabled]="headingAdded">
                ➕ Add Heading
            </button>

            <button class="btn" (click)="addParagraph()">
                ➕ Add Paragraph
            </button>

            <button class="btn" (click)="openSignatureModal()" [disabled]="signatureAdded">
                ✍️ Add Signature Area
            </button>

            <p class="hint">
                * Heading & Signature only once
            </p>
        </div>

        <!-- RIGHT : EDITOR -->
        <div class="builder-preview">
            <div class="page">

                <ng-container *ngFor="let block of blocks; trackBy: trackById">

                    <!-- ========== HEADING ========== -->
                    <h1 *ngIf="block.type === 'heading'" class="doc-heading editable" contenteditable="true"
                        spellcheck="false" data-placeholder="Type agreement heading here" [attr.data-id]="block.id"
                        (focus)="saveCursor()" (input)="updateBlockValue($event, block)">
                    </h1>

                    <!-- ========== PARAGRAPH ========== -->
                    <p *ngIf="block.type === 'paragraph'" class="doc-para editable" contenteditable="true"
                        spellcheck="false" data-placeholder="Type paragraph content here..." [attr.data-id]="block.id"
                        (focus)="saveCursor()" (input)="updateBlockValue($event, block)">
                    </p>

                    <div *ngIf="block.type === 'paragraph'" class="para-gap"></div>

                    <!-- ========== SIGNATURE ========== -->
                    <div *ngIf="block.type === 'signature'" class="signature-section">

                        <div class="sign-box" *ngFor="let signer of block.signers">
                            <p class="sign-name">{{ signer.name }}</p>

                            <div class="sign-placeholder">
                                {{ signer.signed ? 'Signed' : 'Pending Signature' }}
                            </div>

                            <div *ngIf="block.includeDate" class="sign-date">
                                Date: {{ signer.signed ? signer.signedAt : '{{sign_date}}' }}
                            </div>
                        </div>

                    </div>

                </ng-container>

            </div>
        </div>
    </div>

    <!-- ================= VARIABLE MODAL ================= -->
    <div class="modal-backdrop" *ngIf="showVariableModal">
        <div class="modal-card">
            <h4>Add Variable</h4>

            <input placeholder="Key (tenant_name)" [(ngModel)]="variableForm.key" />

            <div class="modal-actions">
                <button class="btn-add" (click)="addVariable()">Add</button>
                <button class="btn-cancel" (click)="closeVariableModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================= TEMPLATE NAME MODAL ================= -->
    <div class="modal-backdrop" *ngIf="showTemplateNameModal">
        <div class="modal-card">
            <h4>Add Template Name</h4>

            <input placeholder="Template Name" [(ngModel)]="templateName" />

            <div class="modal-actions">
                <button class="btn-add" *ngIf="submitbtn" (click)="confirmSaveTemplate()">
                    Save
                </button>

                <button class="btn-add mx-1" *ngIf="!submitbtn" disabled>
                    Saving...
                </button>

                <button class="btn-cancel" (click)="closeTemplateNameModal()">Cancel</button>
            </div>
        </div>
    </div>

</section>
