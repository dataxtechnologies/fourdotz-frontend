<div class="mt-4 header-btn">
  <div class="d-flex gap-3 align-items-center">
    <i class="fa-solid fa-arrow-left" style="cursor: pointer;" (click)="goback()"></i>
    <h3>Sign Agreement</h3>
  </div>

  <div>
    <!-- Sign button: visible only if first signer hasn't signed yet -->
    <button class="btn-add" (click)="openSignModal()" *ngIf="shouldShowSignButton()">
      Sign Agreement
    </button>

    <!-- Send button: visible only if 2 signers exist AND first signed, second hasn't -->
    <button class="btn-add" (click)="sendAgreement()" *ngIf="shouldShowSendButton()">
      Send Agreement
    </button>
  </div>
</div>

<section class="agreement-viewer" *ngIf="template">
  <div class="preview-panel">
    <div class="page">
      <ng-container *ngFor="let block of template.blocks">

        <!-- HEADING — innerHTML to avoid raw HTML tags showing -->
        <h1 *ngIf="block.type === 'heading'" class="doc-heading"
            [innerHTML]="block.value">
        </h1>

        <!-- PARAGRAPH — innerHTML so variables and spaces render correctly -->
        <p *ngIf="block.type === 'paragraph'" class="doc-para"
           [innerHTML]="renderText(block.value)">
        </p>

        <!-- SIGNATURE BLOCK -->
        <div *ngIf="block.type === 'signature'" class="signature-section">
          <div class="sign-box" *ngFor="let signer of block.signers">
            <p class="sign-name">{{ signer.name | titlecase }}</p>
            <div class="sign-placeholder">
              <!-- NOT SIGNED -->
              <span *ngIf="!signer.signed" class="pending-label">
                Signature Pending
              </span>
              <!-- TYPED SIGNATURE -->
              <span *ngIf="signer.signed && signer.Signer_type === 'type'"
                    class="typed-signature" [ngClass]="signer.Signer_font">
                {{ signer.signer_name }}
              </span>
              <!-- IMAGE SIGNATURE -->
              <img *ngIf="signer.signed && signer.Signer_type === 'image'"
                   [src]="signer.signer_name"
                   class="signature-img" alt="Signature" />
            </div>
            <div *ngIf="block.includeDate" class="sign-date">
              Date: {{ signer.signed ? signer.signed_date : 'Not signed yet' }}
            </div>
          </div>
        </div>

      </ng-container>
    </div>
  </div>
</section>
