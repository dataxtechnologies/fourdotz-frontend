<section class="login-wrapper">

    <div class="login-container">

        <!-- Logo -->
        <div>
            <img src="assets/logo/fourdotz-logo.png" alt="fourdotz-logo" class="logo-img">
        </div>

        <h2 class="medium-font" style="margin-top: 10px; font-size: 30px;">
            Change Password
        </h2>

        <p class="description regular-font" style="text-align:center;">
            You can set a new password to secure your account.<br>
            Please choose a strong password for safe access.
        </p>

        <form [formGroup]="passwordForm" class="login-box">

            <!-- New Password -->
             <div class="inp-cont password-group">
                <label class="medium-font" for="newPassword">New Password <span class="required">*</span></label>
                <input [type]="showNewPassword ? 'text' : 'password'" id="newPassword" placeholder="Enter New Password"
                    class="inp-cus regular-font" formControlName="newPassword" />
                <span class="toggle-password" (click)="toggleNewPassword()">
                    <i [class]="showNewPassword ? 'fa-solid fa-unlock' : 'fa-solid fa-lock'"></i>
                </span>
                <div class="error-text"
                    *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.invalid">
                    Password must be at least 6 characters
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="inp-cont password-group">
                <label class="medium-font" for="confirmPassword">Confirm Password <span class="required">*</span></label>
                <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                    placeholder="Enter Confirm Password" class="inp-cus regular-font" formControlName="confirmPassword" />
                <span class="toggle-password" (click)="toggleConfirmPassword()">
                    <i [class]="showConfirmPassword ? 'fa-solid fa-unlock' : 'fa-solid fa-lock'"></i>
                </span>
                <div class="error-text"
                    *ngIf="passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched">
                    Passwords do not match
                </div>
            </div>

            <button type="button" class="login-btn" (click)="updatePassword()"
                [disabled]="passwordForm.invalid || passwordMismatch || btnloading">
                <span *ngIf="!updbtnloading">Update Password</span>
                <span *ngIf="updbtnloading">Updating...</span>
            </button>

            <button class="back-btn" (click)="gotoBack()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>

        </form>

    </div>

</section>
