<section class="form-section ">
<div class="form-header">
    <h3>Delete Gate</h3>
    <i class="fa-solid fa-xmark" (click)="closeModal()"></i>
</div>

<div class="form-body">
    <p class="warning-text regular-font">
        <strong>Warning:</strong> This action cannot be undone. If you delete this gate,
        it will be permanently removed from your community, and you will no longer
        be able to view, edit, or manage its details.
    </p>

        <div class="inp-cont">
            <label class="medium-font" for="confirmText">To confirm, type <span class="highlight">DELETE</span> below:</label>
            <input id="confirmText" type="text" [(ngModel)]="confirmationText" placeholder="Type DELETE to confirm"
                class="input-custom-style regular-font" />
        </div>

        <div class="popup-actions">
            <button class="cancel-btn" (click)="closeModal()">No, Cancel</button>
            <button class="delete-btn" [disabled]="!canDelete()" (click)="confirmDelete(gate_id)" *ngIf="!showprocessingbtn">
                Yes, Delete Gate
            </button>
            <button class="delete-btn"  disabled *ngIf="showprocessingbtn" (click)="confirmDelete(gate_id)">
                Processing...
            </button>
        </div>
    </div>
</section>
