<section class="form-section">
  <div class="form-header">
    <div class="header-left">
      <span class="header-icon">🏠</span>
      <h3 class="heading-font">Owner Approval Request</h3>
    </div>
    <i class="fa-solid fa-xmark" (click)="closeModal()"></i>
  </div>

  <div class="form-body">
    <form [formGroup]="ownerForm">

      
      <!-- Owned Date -->
      <div class="inp-cont">
        <label class="medium-font">Owned Date <span class="required">*</span></label>
        <div class="date-input-wrapper">
          <input
            type="text"
            formControlName="ownedDate"
            class="input-custom-style regular-font date-display"
            placeholder="DD / MM / YYYY"
            readonly
            (click)="openDatePicker()"
          />
          <span class="calendar-icon" (click)="openDatePicker()">
            <i class="fa-regular fa-calendar"></i>
          </span>
          <input
            #datePickerRef
            type="date"
            class="hidden-date-input"
            [max]="todayStr"
            (change)="onDateSelected($event)"
          />
        </div>
        <div *ngIf="ownerForm.get('ownedDate')?.touched && ownerForm.get('ownedDate')?.errors?.['required']" class="error-text">
          <i class="fa-solid fa-circle-exclamation"></i> Owned date is required
        </div>
        <div *ngIf="ownerForm.get('ownedDate')?.touched && ownerForm.get('ownedDate')?.errors?.['futureDate']" class="error-text">
          <i class="fa-solid fa-circle-exclamation"></i> Owned date cannot be in the future
        </div>
      </div>


      <!-- Submit -->
      <div class="btn-row">
        <button type="submit" class="submit-btn" (click)="onSubmit()" *ngIf="submitbtn">
          <i class="fa-solid fa-paper-plane"></i> Submit Request
        </button>
        <button type="button" class="processing-btn" *ngIf="!submitbtn" disabled>
          <span class="btn-spinner"></span> Processing...
        </button>
      </div>

    </form>
  </div>
</section>
