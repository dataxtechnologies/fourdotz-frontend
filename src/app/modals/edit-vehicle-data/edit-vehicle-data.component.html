<section class="form-section ">
    <div class="form-header">
        <h3>Edit Vehicle</h3>
        <i class="fa-solid fa-xmark" (click)="closeModal()"></i>
    </div>

    <div class="form-body">
        <form [formGroup]="vehicleForm" (ngSubmit)="EditVehicle()">

            <!-- VEHICLE TYPE RADIO -->
            <div class="inp-cont">
                <label class="medium-font">Vehicle Type <span class="required">*</span></label>

                <div class="d-flex gap-4 mt-2">
                    <label class="regular-font">
                        <input type="radio" value="2 wheeler" formControlName="vehicleType"
                            (change)="onVehicleTypeChange()" />
                        2 Wheeler
                    </label>

                    <label class="regular-font">
                        <input type="radio" value="4 wheeler" formControlName="vehicleType"
                            (change)="onVehicleTypeChange()" />
                        4 Wheeler
                    </label>
                </div>

                <small class="text-danger regular-font" *ngIf="isInvalid('vehicleType')">
                    Vehicle Type is required.
                </small>
            </div>

            <!-- BRAND DROPDOWN -->
            <div class="inp-cont">
                <label class="medium-font">Brand <span class="required">*</span></label>

                <select class="input-custom-style regular-font" formControlName="brand">
                    <option value="">Select Brand</option>

                    <option *ngFor="let b of brandList" [value]="b.brand">
                        {{ b.brand }}
                    </option>
                </select>

                <small class="text-danger regular-font" *ngIf="isInvalid('brand')">
                    Brand is required.
                </small>
            </div>

            <!-- MODEL -->
            <div class="inp-cont">
                <label class="medium-font">Vehicle Model <span class="required">*</span></label>
                <input type="text" class="input-custom-style regular-font" formControlName="model"
                    placeholder="Enter your Vehicle Model" />
                <small class="text-danger regular-font" *ngIf="isInvalid('model')">
                    Vehicle Model is required.
                </small>
            </div>

            <!-- NUMBER -->
            <div class="inp-cont">
                <label class="medium-font">Vehicle Number <span class="required">*</span></label>
                <input type="text" class="input-custom-style regular-font" formControlName="vehicleNumber"
                    placeholder="TN01AB1234" maxlength="10" (input)="onVehicleNumberInput($event)" />
                <small class="text-danger regular-font" *ngIf="isInvalid('vehicleNumber')">
                    Vehicle Number must be in format TN01AB1234
                </small>
            </div>

            <!-- OWNED BY -->
            <div class="inp-cont">
                <label class="medium-font">Vehicle Owned By <span class="required">*</span></label>
                <select class="input-custom-style regular-font" formControlName="ownedBy">
                    <option value="">Select Options</option>
                    <option value="owner">Owner</option>
                    <option value="tenant">Tenant</option>
                </select>
                <small class="text-danger regular-font" *ngIf="isInvalid('ownedBy')">
                    Select Owner or Tenant.
                </small>
            </div>

            <div class="mb-3">
                <button class="submit-btn" type="submit" *ngIf="submitbtn">Submit</button>
                <button class="processing-btn" type="button" *ngIf="!submitbtn">processing...</button>
            </div>

        </form>
    </div>
</section>
