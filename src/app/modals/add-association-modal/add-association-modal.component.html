<section class="form-section ">
  <div class="form-header">
    <h3>Add Association</h3>
    <i class="fa-solid fa-xmark" (click)="closeModal()"></i>
  </div>

  <div class="form-body scrollable">
    <form [formGroup]="associationForm" (ngSubmit)="createAssociation()">
      <div class="inp-cont">
        <label class="medium-font" for="name">HOA(Head Of Association) Name <span class="required">*</span></label>
        <input type="text" id="name" class="input-custom-style regular-font" placeholder="Enter your HOA Name"
          formControlName="name">
        <small *ngIf="isInvalid('name')" class="error-text">Name is required</small>
      </div>

      <div class="inp-cont">
        <label class="medium-font" for="email">Email ID <span class="required">*</span></label>
        <input type="email" id="email" class="input-custom-style regular-font" placeholder="Enter your Email"
          formControlName="email">

        <small *ngIf="isInvalid('email')" class="error-text">Valid email is required</small>
      </div>

      <div class="inp-cont">
        <label class="medium-font">Phone Number <span class="required">*</span></label>

        <div class="input-group-kkk">
          <input type="tel" class="input-custom-style regular-font" placeholder="Enter your Phone Number"
            formControlName="phone" maxlength="10" />

          <button type="button" class="send-otp-btn" (click)="sendOtp()"
            [disabled]="associationForm.get('phone')?.invalid || otpTimer > 0 || isSendingOtp ">
            <span *ngIf="!isSendingOtp">
              {{ otpTimer > 0
              ? 'Resend OTP in ' + otpTimer + 's'
              : (otpSent ? 'Resend OTP' : 'Send OTP') }}
            </span>

            <span *ngIf="isSendingOtp" class="spinner"></span>
          </button>
        </div>

        <small *ngIf="associationForm.get('phone')?.touched && associationForm.get('phone')?.errors?.['required']"
          class="error-text">Phone number is required</small>

        <small *ngIf="associationForm.get('phone')?.touched && associationForm.get('phone')?.errors?.['pattern']"
          class="error-text">Phone must be 10 digits</small>
      </div>
      <div class="inp-cont" *ngIf="otpSent">
        <label class="medium-font">Verify OTP <span class="required">*</span></label>

        <div class="input-group-kkk">
          <input type="text" class="input-custom-style regular-font" placeholder="Enter OTP" formControlName="otp"
            maxlength="5" [readonly]="otpVerified" />

          <button type="button" class="send-otp-btn" (click)="verifyOtp()"
            [disabled]="associationForm.get('otp')?.value?.length !== 5 || otpVerified">
            Verify
          </button>
        </div>

        <small *ngIf="otpVerified" style="color: green;">OTP Verified ✅</small>
      </div>

      <div class="inp-cont">
        <label class="medium-font" for="associationName">Association Name <span class="required">*</span></label>
        <input type="text" id="associationName" class="input-custom-style regular-font"
          placeholder="Enter your Association Name" formControlName="associationName">
        <small *ngIf="isInvalid('associationName')" class="error-text">Association Name is required</small>
      </div>

      <div class="inp-cont">
        <label class="medium-font">Property Type <span class="required">*</span></label>
        <div class="checkbox-group" formGroupName="propertyType">
          <label class="medium-font" class="checkbox-cus">
            <input type="checkbox" formControlName="villa">
            <span class="regular-font">Villa</span>
          </label>
          <label class="medium-font" class="checkbox-cus">
            <input type="checkbox" formControlName="apartment">
            <span class="regular-font">Apartment</span>
          </label>
          <label class="medium-font" class="checkbox-cus">
            <input type="checkbox" formControlName="townhouse">
            <span class="regular-font">Town House</span>
          </label>
        </div>
        <small *ngIf="!anyPropertySelected() && associationForm.get('propertyType')?.touched" class="error-text">Select
          at least one property
          type</small>
      </div>

      <div>
        <button type="submit" class="submit-btn" *ngIf="createButton" [disabled]="!otpVerified">
          Submit
        </button>
        <button type="button" class="processing-btn-submit" *ngIf="!createButton">Processing...</button>
      </div>
    </form>
  </div>
</section>
