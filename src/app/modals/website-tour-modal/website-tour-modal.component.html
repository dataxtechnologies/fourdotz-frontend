<section class="tour-backdrop-top">
    <div class="tour-backdrop">
        <div class="tour-modal fade-slide">

            <!-- HEADER -->
            <div class="tour-header">
                <h2>{{ associationPropertyTour.tourTitle }}</h2>
                <span class="step-count">
                    {{ currentStepIndex + 1 }} / {{ associationPropertyTour.steps.length }}
                </span>
            </div>

            <!-- BODY -->
            <div class="tour-body">

                <!-- LEFT IMAGE -->
                <div class="tour-image">

                    <div class="carousel">

                        <img [src]="currentImages[currentImageIndex]" [alt]="currentStep.title"
                            class="carousel-image" />
                        <!-- LEFT ARROW -->
                        <button class="carousel-btn left" *ngIf="currentImages.length > 1" (click)="prevImage()"
                            [disabled]="currentImageIndex === 0">
                            ‹
                        </button>

                        <!-- RIGHT ARROW -->
                        <button class="carousel-btn right" *ngIf="currentImages.length > 1" (click)="nextImage()"
                            [disabled]="currentImageIndex === currentImages.length - 1">
                            ›
                        </button>

                        <!-- DOTS -->
                        <div class="carousel-dots" *ngIf="currentImages.length > 1">
                            <span *ngFor="let img of currentImages; let i = index"
                                [class.active]="i === currentImageIndex"></span>
                        </div>

                    </div>

                </div>

                <!-- RIGHT CONTENT -->
                <div class="tour-content">
                    <h3>{{ currentStep.title }}</h3>
                    <p class="regular-font">{{ currentStep.description }}</p>

                    <!-- PROGRESS BAR -->
                    <div class="progress-bar">
                        <div class="progress-fill" [style.width.%]="
              ((currentStepIndex + 1) / associationPropertyTour.steps.length) * 100
            "></div>
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="tour-actions">
                        <!-- <div class="d-flex justify-content-between align-items-center"> -->
                            <div>
                                <button class="btn secondary" (click)="proceed()">Skip</button>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <button class="btn secondary" (click)="previousStep()"
                                    [disabled]="currentStepIndex === 0">
                                    Previous
                                </button>

                                <div>
                                    <button class="btn primary" *ngIf="currentStep.buttonText !== 'Proceed'"
                                    (click)="nextStep()">
                                    {{ currentStep.buttonText }}
                                </button>

                                <button class="btn success" *ngIf="currentStep.buttonText === 'Proceed'"
                                    (click)="proceed()">
                                     Proceed
                                </button>
                                </div>
                            </div>
                        <!-- </div> -->
                    </div>
                </div>
            </div>

        </div>
    </div>

</section>
